<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Agenda Polare v14.9</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#040d1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Polare">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Agenda visuale in coordinate polari">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#040d1e; --surface:#091525; --surface2:#0f2244;
      --border:rgba(56,189,248,.13); --text:#e2e8f0; --muted:#64748b;
      --accent:#38bdf8; --today:#f43f5e;
      --morning:#fbbf24; --afternoon:#22d3ee; --evening:#a78bfa;
      --nav-h:54px;
      --star-opacity:.8;
    }
    :root.light{
      --bg:#f0f4f8; --surface:#ffffff; --surface2:#e8f0f8;
      --border:rgba(14,100,165,.15); --text:#1e293b; --muted:#64748b;
      --accent:#0e6497; --today:#e11d48;
      --morning:#d97706; --afternoon:#0891b2; --evening:#7c3aed;
      --star-opacity:0;
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);transition:background .3s}
    body{font-family:'Exo 2',sans-serif;color:var(--text);font-size:14px;transition:color .3s}
    #root{height:100%;display:flex;flex-direction:column}

    /* STARS */
    .stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;opacity:var(--star-opacity);transition:opacity .4s}
    .star{position:absolute;border-radius:50%;animation:twk var(--d) infinite;opacity:0}
    @keyframes twk{0%,100%{opacity:.1}50%{opacity:var(--o)}}

    /* LOGIN */
    .login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:28px;position:relative;z-index:1;overflow-y:auto}
    .login-logo{font-family:'Orbitron',monospace;font-size:30px;font-weight:900;background:linear-gradient(135deg,#38bdf8 30%,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;text-align:center;line-height:1.2}
    .login-sub{color:var(--muted);text-align:center;font-size:13px;line-height:1.7}
    .login-mode-tabs{display:flex;background:rgba(255,255,255,.05);border-radius:10px;padding:3px;width:100%;max-width:300px}
    .login-tab{flex:1;padding:8px;border:none;background:transparent;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:all .2s}
    .login-tab.on{background:rgba(56,189,248,.15);color:var(--accent)}
    .login-form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:9px}
    .login-input{width:100%;padding:10px 13px;background:rgba(255,255,255,.06);border:1px solid rgba(56,189,248,.2);border-radius:10px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
    .login-input:focus{border-color:var(--accent)}
    .login-input::placeholder{color:rgba(100,116,139,.6)}
    .login-submit{width:100%;padding:11px;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;border-radius:10px;color:#fff;font-family:'Exo 2',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
    .login-submit:disabled{opacity:.5}
    .login-divider{display:flex;align-items:center;gap:10px;color:rgba(100,116,139,.5);font-size:11px;width:100%;max-width:300px}
    .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:rgba(56,189,248,.12)}
    .google-btn{display:flex;align-items:center;gap:10px;padding:10px 20px;background:rgba(255,255,255,.95);color:#333;border-radius:10px;border:none;font-family:'Exo 2',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;max-width:300px;justify-content:center;transition:transform .15s}
    .google-btn:active{transform:scale(.96)}
    .login-err{color:#f87171;font-size:12px;text-align:center;padding:7px 10px;background:rgba(248,113,113,.1);border-radius:8px;width:100%;max-width:300px}

    /* HEADER */
    .header{display:flex;align-items:center;gap:6px;padding:8px 12px;flex-shrink:0;background:linear-gradient(180deg,var(--surface) 60%,transparent);position:relative;z-index:10;transition:background .3s}
    .app-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;background:linear-gradient(135deg,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;flex-shrink:0}
    .nav-center{display:flex;align-items:center;gap:4px;flex:1;justify-content:center}
    .nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:4px 9px;cursor:pointer;font-size:14px;line-height:1}
    .nav-lbl{font-size:11px;color:var(--muted);min-width:88px;text-align:center}
    .today-btn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:4px 7px;cursor:pointer;font-size:10px;font-family:'Exo 2',sans-serif;transition:all .2s}
    .today-btn:hover{border-color:var(--accent);color:var(--accent)}
    .avatar{width:27px;height:27px;border-radius:50%;cursor:pointer;object-fit:cover;border:1px solid var(--border)}
    .user-icon{width:27px;height:27px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
    .theme-btn{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all .2s}
    .theme-btn:hover{border-color:var(--accent)}

    /* SUB-TABS BAR */
    .sub-tabs{display:flex;gap:4px;padding:4px 12px;flex-shrink:0;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
    .sub-tabs::-webkit-scrollbar{display:none}
    .stab{padding:5px 12px;border-radius:18px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s}
    .stab.on{background:rgba(56,189,248,.15);border-color:var(--accent);color:var(--accent)}
    .stab-sep{width:1px;background:var(--border);margin:2px 2px;flex-shrink:0}

    /* RING CONTROLS */
    .ring-ctrl{display:flex;gap:5px;align-items:center;padding:5px 12px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
    .ring-ctrl::-webkit-scrollbar{display:none}
    .rbtn{display:flex;align-items:center;gap:3px;padding:4px 9px;border-radius:20px;border:1px solid;font-family:'Exo 2',sans-serif;font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .2s;background:transparent}
    .rbtn.morning{border-color:var(--morning);color:var(--morning)}.rbtn.morning.on{background:rgba(251,191,36,.13)}
    .rbtn.afternoon{border-color:var(--afternoon);color:var(--afternoon)}.rbtn.afternoon.on{background:rgba(34,211,238,.13)}
    .rbtn.evening{border-color:var(--evening);color:var(--evening)}.rbtn.evening.on{background:rgba(167,139,250,.13)}
    .rbtn.inv{border-color:var(--border);color:var(--muted)}
    .ring-pos{opacity:.5;font-size:9px}

    /* POLAR */
    .polar-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:2px}
    .polar-svg{width:100%;max-width:420px;height:auto;touch-action:manipulation}

    /* WEEK GRID (griglia oraria classica) */
    .wg-outer{flex:1;overflow:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .wg-table{display:grid;min-width:0;position:relative}
    .wg-time-col{position:sticky;left:0;background:var(--bg);z-index:5;width:38px;flex-shrink:0}
    .wg-day-hdr{text-align:center;padding:5px 2px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:4;font-size:10px}
    .wg-day-hdr.today-col{background:rgba(244,63,94,.12);color:var(--today)}
    .wg-day-hdr span{display:block;font-size:14px;font-weight:700}
    .wg-body{display:contents}
    .wg-hour-lbl{font-size:10px;color:var(--muted);text-align:right;padding-right:6px;line-height:1;padding-top:2px;border-top:1px solid var(--border)}
    .wg-cell{border-top:1px solid rgba(56,189,248,.06);border-left:1px solid rgba(56,189,248,.05);position:relative;min-height:28px}
    .wg-cell.wg-today{background:rgba(244,63,94,.025)}
    .wg-ev{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 4px;font-size:9px;font-weight:600;overflow:hidden;cursor:pointer;line-height:1.3;z-index:2}
    .wg-now-line{position:absolute;left:0;right:0;height:2px;background:#f43f5e;z-index:6;opacity:.7}
    .wg-now-dot{position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:#f43f5e}

    /* MONTH GRID */
    .month-grid-wrap{flex:1;overflow-y:auto;padding:5px 8px 70px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .mg-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
    .mg-hdr{text-align:center;font-size:9px;font-weight:600;color:var(--muted);padding:4px 0;text-transform:uppercase;letter-spacing:.4px}
    .mg-cell{min-height:50px;padding:3px;background:var(--surface);border-radius:6px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column}
    .mg-cell:hover{background:var(--surface2)}
    .mg-cell.empty{background:transparent;cursor:default}
    .mg-cell.today{background:rgba(244,63,94,.12);border:1px solid rgba(244,63,94,.28)}
    .mg-cell.weekend{background:rgba(15,34,68,.6)}
    .mg-day-num{font-size:11px;font-weight:600;color:#94a3b8;line-height:1}
    .mg-cell.today .mg-day-num{color:var(--today)}
    .mg-dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
    .mg-dot{width:5px;height:5px;border-radius:50%}
    .mg-ev-preview{font-size:8px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* LIST */
    .ev-list{flex:1;overflow-y:auto;padding:4px 12px 70px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .ev-day-hdr{font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1px;padding:10px 2px 4px;font-family:'Orbitron',monospace}
    .ev-day-hdr.is-today{color:var(--today)}
    .ev-item{display:flex;align-items:center;gap:10px;padding:9px 10px;margin-bottom:5px;background:var(--surface);border-radius:10px;border-left:3px solid;cursor:pointer;transition:background .15s}
    .ev-item:hover{background:var(--surface2)}
    .ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .ev-ttl{font-weight:600;font-size:13px}
    .ev-time{font-size:11px;color:var(--muted);margin-top:1px}
    .ev-none{color:rgba(100,116,139,.4);font-size:12px;padding:6px 2px}

    /* BOTTOM NAV */
    .bottom-nav{display:flex;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;z-index:50;transition:background .3s}
    .bn-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:9px;font-weight:500;transition:color .2s;padding:0}
    .bn-tab.on{color:var(--accent)}
    .bn-icon{font-size:16px;line-height:1}

    /* FAB */
    .fab{position:fixed;bottom:calc(var(--nav-h) + 12px);right:15px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(56,189,248,.38);z-index:100;transition:transform .15s}
    .fab:active{transform:scale(.9)}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(4,13,30,.88);backdrop-filter:blur(5px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .modal{background:var(--surface);border-radius:22px 22px 0 0;padding:15px 15px 28px;width:100%;max-width:480px;border-top:1px solid var(--border);max-height:92vh;overflow-y:auto;transition:background .3s}
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px}
    .modal-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:13px}
    .fg{margin-bottom:11px}
    .flbl{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
    .fi{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 12px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
    .fi:focus{border-color:var(--accent)}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .color-row{display:flex;gap:5px;flex-wrap:wrap}
    .cdot{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative;display:flex;align-items:center;justify-content:center}
    .cdot.sel{border:2px solid #fff;box-shadow:0 0 0 2px rgba(0,0,0,.6),0 0 8px rgba(0,0,0,.4);transform:scale(1.25)}
    .cdot.sel::after{content:"✓";color:rgba(0,0,0,.78);font-size:12px;font-weight:800;line-height:1}
    .mactions{display:flex;gap:8px;margin-top:13px}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
    .toggle-lbl{font-size:13px;font-weight:500;color:var(--text)}
    .toggle-sub{font-size:11px;color:var(--muted);margin-top:1px}
    .toggle-sw{position:relative;width:42px;height:24px;flex-shrink:0}
    .toggle-sw input{opacity:0;width:0;height:0;position:absolute}
    .toggle-track{position:absolute;inset:0;border-radius:12px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;transition:background .2s}
    .toggle-sw input:checked+.toggle-track{background:var(--accent);border-color:var(--accent)}
    .toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s;pointer-events:none}
    .toggle-sw input:checked~.toggle-thumb{transform:translateX(18px)}
    .important-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:10px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.4);color:#fbbf24;font-size:10px;font-weight:600}
    .share-section{margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
    .share-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
    .share-row{display:flex;gap:6px}
    .share-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 11px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
    .share-input:focus{border-color:var(--accent)}
    .share-btn{padding:8px 12px;border-radius:9px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'Exo 2',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .2s}
    .share-btn:hover{border-color:var(--accent);color:var(--accent)}
    .share-result{margin-top:8px;padding:8px 10px;border-radius:9px;font-size:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}
    .share-result.found{background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);color:var(--text)}
    .share-result.notfound{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:#f87171}
    .share-action{padding:5px 10px;border-radius:7px;border:none;font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;cursor:pointer}
    .share-action.invite{background:rgba(56,189,248,.15);color:var(--accent)}
    .share-action.send{background:rgba(34,211,238,.15);color:#22d3ee}
    .tpl-row{display:flex;gap:6px;flex-wrap:wrap;padding-bottom:2px}
        .tpl-chip{padding:7px 10px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Exo 2',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
    .tpl-chip.add{border-style:dashed;color:var(--accent)}
    .tpl-help{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4}
    .mbtn{flex:1;padding:10px;border-radius:10px;border:none;font-family:'Exo 2',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
    .mbtn:active{opacity:.8}
    .mbtn-save{background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff}
    .mbtn-del{background:rgba(244,63,94,.13);color:var(--today);border:1px solid rgba(244,63,94,.3)}
    .mbtn-cancel{background:var(--surface2);color:var(--muted)}

    /* ── WEEKEND VIEW ── */
    .we-wrap{flex:1;overflow-y:auto;padding:6px 10px 80px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;touch-action:pan-y}
    .we-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .we-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s;position:relative;user-select:none;-webkit-user-select:none;touch-action:pan-y}
    .we-card.custom{border:2px solid var(--accent);box-shadow:0 0 12px rgba(56,189,248,.18)}
    .we-card.pressing{opacity:.7;transform:scale(.97);transition:transform .1s}
    .we-card-hdr{padding:8px 10px 6px;border-bottom:1px solid var(--border)}
    .we-card-range{font-size:11px;font-weight:700;color:var(--text);line-height:1.3}
    .we-card-days{font-size:9px;color:var(--muted);margin-top:1px}
    .we-card-body{padding:7px 10px 9px;min-height:50px}
    .we-ev-row{display:flex;align-items:center;gap:6px;padding:2px 0}
    .we-ev-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .we-ev-title{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
    .we-ev-more{font-size:9px;color:var(--muted);padding:2px 0}
    .we-ev-empty{font-size:10px;color:rgba(100,116,139,.35);font-style:italic}
    .we-custom-badge{position:absolute;top:6px;right:6px;font-size:9px;color:var(--accent);font-weight:700}
    /* Modal estensione */
    .we-ext-overlay{position:fixed;inset:0;background:rgba(4,13,30,.82);z-index:250;display:flex;align-items:flex-end;justify-content:center}
    .we-ext-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-width:480px;border-top:1px solid var(--border);padding:14px 16px 32px}
    .we-ext-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
    .we-ext-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:4px}
    .we-ext-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
    .we-preset-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .we-preset{padding:10px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Exo 2',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .2s}
    .we-preset.on{border-color:var(--accent);background:rgba(56,189,248,.12);color:var(--accent)}
    .we-preset span{display:block;font-size:9px;color:var(--muted);margin-top:2px}
    .we-custom-dates{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .we-ext-actions{display:flex;gap:8px}
    .loading{flex:1;display:flex;align-items:center;justify-content:center;color:var(--accent);font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px}
    /* DAY DETAIL PANEL */

function templateKey(uid,priv=false){return 'agenda_polare_templates'+(priv?'_priv':'')+'_'+uid}
function deletedDefaultKey(uid,priv=false){return 'agenda_polare_del_defaults'+(priv?'_priv':'')+'_'+uid}
function loadDeletedDefaults(uid,priv=false){
  try{return JSON.parse(localStorage.getItem(deletedDefaultKey(uid,priv))||'[]');}catch(e){return [];}
}

function loadTemplates(uid,priv=false){
  try{
    const raw=localStorage.getItem(templateKey(uid,priv));
    const parsed=raw?JSON.parse(raw):[];
    // L'agenda privata non ha modelli di default predefiniti
    if(priv) return Array.isArray(parsed)?parsed:[];
    const deleted=loadDeletedDefaults(uid,false);

    return [...defaults,...(Array.isArray(parsed)?parsed:[])];

}

    const custom=priv
      ?(templates||[])  // privati: salva tutto (nessun default da escludere)

const D_SHORT=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const D_FULL =['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
const MESI   =['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const ANG0=-90;

// ===== HELPERS =====
function rad(d){return d*Math.PI/180}
function t2m(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+(m||0)}
function d2s(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function todayStr(){return d2s(new Date())}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function getMonday(base){const d=new Date(base);d.setHours(0,0,0,0);const wd=d.getDay();d.setDate(d.getDate()+(wd===0?-6:1-wd));return d}
function weekNum(d){const dd=new Date(d);dd.setHours(0,0,0,0);dd.setDate(dd.getDate()+3-(dd.getDay()+6)%7);const w1=new Date(dd.getFullYear(),0,4);return 1+Math.round(((dd-w1)/86400000-3+(w1.getDay()+6)%7)/7)}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function dayIndex(d){const wd=d.getDay();return wd===0?6:wd-1}

function arcPath(r1,r2,a,b){
  if(b-a<0.1)return '';
  const big=(b-a)>180?1:0;
  function pt(r,ang){return[CX+r*Math.cos(rad(ang)),CY+r*Math.sin(rad(ang))]}
  const[x1,y1]=pt(r2,a),[x2,y2]=pt(r2,b),[x3,y3]=pt(r1,b),[x4,y4]=pt(r1,a);
  return 'M'+x1.toFixed(2)+' '+y1.toFixed(2)+' A'+r2+' '+r2+' 0 '+big+' 1 '+x2.toFixed(2)+' '+y2.toFixed(2)+
         ' L'+x3.toFixed(2)+' '+y3.toFixed(2)+' A'+r1+' '+r1+' 0 '+big+' 0 '+x4.toFixed(2)+' '+y4.toFixed(2)+'Z';
}

function getWeekendsForMonth(year,month,weekendCustom){
  const seen=new Set(), result=[];
  const dim=daysInMonth(year,month);
  // Considera anche domenica 1° del mese (il sabato è nel mese precedente)
  for(let d=0;d<=dim+1;d++){
    const date=new Date(year,month,d); // d=0 = ultimo giorno mese prec
    const dow=date.getDay();
    if(dow!==6&&dow!==0) continue;
    const satDate=dow===6?date:addDays(date,-1);
    const satStr=d2s(satDate);
    if(seen.has(satStr)) continue;
    // Mostra solo se sabato o domenica è nel mese corrente
    const sunDate=addDays(satDate,1);
    const satInMonth=satDate.getMonth()===month&&satDate.getFullYear()===year;
    const sunInMonth=sunDate.getMonth()===month&&sunDate.getFullYear()===year;
    if(!satInMonth&&!sunInMonth) continue;
    seen.add(satStr);
    const custom=weekendCustom[satStr];
    const startStr=custom?custom.startDate:satStr;
    const endStr=custom?custom.endDate:d2s(sunDate);
    result.push({satStr,sunStr:d2s(sunDate),startStr,endStr,isCustom:!!custom});
  }
  result.sort((a,b)=>a.satStr.localeCompare(b.satStr));
  return result;
}

function splitBands(sMin,eMin){
  const res=[];
  BANDS.forEach(b=>{const bs=b.startH*60,be=b.endH*60,t1=Math.max(sMin,bs),t2=Math.min(eMin,be);if(t2>t1)res.push({bandId:b.id,t1,t2});});
  return res;
}

// ===== FIRESTORE =====
function weCustomCol(uid){ return db.collection('users').doc(uid).collection('weekend_custom'); }

async function saveWeekendCustom(uid,satDate,startDate,endDate){
  const sunDate=d2s(addDays(new Date(satDate+'T12:00:00'),1));
  if(startDate===satDate&&endDate===sunDate){
    await weCustomCol(uid).doc(satDate).delete();
  } else {
    await weCustomCol(uid).doc(satDate).set({satDate,startDate,endDate});
  }
}

function evCol(uid,priv=false){
  return db.collection('users').doc(uid).collection(priv?'agenda_privata':'agenda_polare');

// ── PIN helpers ──
async function sha256(text){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function savePin(uid,pin){
  const hash=await sha256(pin+'_ap_salt_'+uid);
  await db.collection('users').doc(uid).set({pinHash:hash},{merge:true});
}
async function checkPin(uid,pin){
  const hash=await sha256(pin+'_ap_salt_'+uid);
  const snap=await db.collection('users').doc(uid).get();
  return snap.exists&&snap.data().pinHash===hash;
}
async function hasPin(uid){
  const snap=await db.collection('users').doc(uid).get();
  return snap.exists&&!!snap.data().pinHash;
}

async function findUserByEmail(email){

async function saveEv(uid,ev,priv=false){
  const{id,...data}=ev;
  if(id){await evCol(uid,priv).doc(id).set(data);return id;}
  const ref=await evCol(uid,priv).add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});return ref.id;
}

async function deleteEv(uid,id,priv=false){await evCol(uid,priv).doc(id).delete()}

async function shareEventWith(ownerUid,ev,targetUid){
  // Copia evento nel calendario del destinatario
  const{id,...data}=ev;
  await evCol(targetUid).add({
    ...data,
    sharedBy:ownerUid,
    sharedEventId:id||null,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });
  // Salva sharedWith sull'evento originale
  if(id){
    await evCol(ownerUid).doc(id).update({
      sharedWith: firebase.firestore.FieldValue.arrayUnion(targetUid)
    });
  }
}

// ===== PIN MODAL =====
function PinModal({uid, mode, onSuccess, onCancel}){
  // mode: 'setup'|'setup2'|'enter'
  const[phase,setPhase]   = useState(mode==='setup'?'setup':'enter');
  const[pin,setPin]       = useState('');
  const[first,setFirst]   = useState('');
  const[err,setErr]       = useState('');
  const[loading,setLoading]= useState(false);

  const add=async(d)=>{
    if(loading)return;
    const next=pin+d;
    setPin(next);
    setErr('');
    if(next.length<4)return;
    setLoading(true);
    // PIN completo
    if(phase==='setup'){
      setFirst(next);setPin('');setPhase('setup2');setLoading(false);return;
    }
    if(phase==='setup2'){
      if(next!==first){setErr('I PIN non coincidono');setPin('');setFirst('');setPhase('setup');setLoading(false);return;}
      await savePin(uid,next);
      setLoading(false);onSuccess();return;
    }
    if(phase==='enter'){
      const ok=await checkPin(uid,next);
      setLoading(false);
      if(ok){onSuccess();}
      else{setErr('PIN errato');setPin('');}
      return;
    }
  };
  const del=()=>{if(loading)return;setPin(p=>p.slice(0,-1));setErr('');};

  const titles={setup:'IMPOSTA PIN',setup2:'CONFERMA PIN',enter:'AREA PRIVATA'};
  const subs={
    setup:'Scegli un PIN di 4 cifre per proteggere la tua agenda segreta.',
    setup2:'Reinserisci il PIN per confermare.',
    enter:'Inserisci il PIN per accedere.'
  };
  const keys=['1','2','3','4','5','6','7','8','9','','0','del'];

  return(
    <div className="pin-overlay">
      <div className="pin-box">
        <div style={{fontSize:28}}>🔒</div>
        <div className="pin-title">{titles[phase]}</div>
        <div className="pin-sub">{subs[phase]}</div>
        <div className="pin-dots">
          {[0,1,2,3].map(i=>(
            <div key={i} className={'pin-dot'+(pin.length>i?' filled':'')}/>
          ))}
        </div>
        {err&&<div className="pin-err">{err}</div>}
        <div className="pin-keypad">
          {keys.map((k,i)=>(
            k===''?<div key={i} className="pin-key empty"/>:
            k==='del'?<button key={i} className="pin-key del" onClick={del}>⌫</button>:
            <button key={i} className="pin-key" onClick={()=>add(k)}>{k}</button>
          ))}
        </div>
        <button className="pin-cancel" onClick={onCancel}>Annulla</button>
      </div>
    </div>
  );
}

// ===== LONG PRESS HOOK =====
function useLongPress(onLongPress,ms=600){
  const timer=useRef(null);
  const fired=useRef(false);
  const start=useRef(null);
  const cancel=()=>{ if(timer.current){clearTimeout(timer.current);timer.current=null;} };
  return{
    onTouchStart:(e)=>{ fired.current=false; start.current={x:e.touches[0].clientX,y:e.touches[0].clientY}; timer.current=setTimeout(()=>{fired.current=true;onLongPress();},ms); },
    onTouchMove:(e)=>{ if(start.current){const dx=e.touches[0].clientX-start.current.x,dy=e.touches[0].clientY-start.current.y;if(Math.abs(dx)>10||Math.abs(dy)>10)cancel();} },
    onTouchEnd:cancel,
    onMouseDown:()=>{ fired.current=false; timer.current=setTimeout(()=>{fired.current=true;onLongPress();},ms); },
    onMouseUp:cancel,
    onMouseLeave:cancel,
  };
}

function Stars(){

  if(!data.current)data.current=Array.from({length:48},()=>({
    left:(Math.random()*100).toFixed(1)+'%',top:(Math.random()*100).toFixed(1)+'%',
    size:(Math.random()*1.6+0.7).toFixed(1)+'px',o:(Math.random()*.6+.2).toFixed(2),d:(Math.random()*3+1.5).toFixed(1)+'s'
  }));
  return <div className="stars">{data.current.map((s,i)=><div key={i} className="star" style={{left:s.left,top:s.top,width:s.size,height:s.size,background:'rgba(255,255,255,.8)','--o':s.o,'--d':s.d}}/>)}</div>;
}
