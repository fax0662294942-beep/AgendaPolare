<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Polare — Ripristino</title>
  <style>
    body { background:#040d1e; color:#e2e8f0; font-family:sans-serif;
           display:flex; flex-direction:column; align-items:center;
           justify-content:center; min-height:100vh; padding:24px; text-align:center; }
    h1 { color:#38bdf8; font-size:20px; margin-bottom:16px; }
    p  { color:#64748b; font-size:14px; margin-bottom:8px; }
    #status { color:#22d3ee; font-size:13px; margin:16px 0; min-height:60px; line-height:1.8; }
    button { padding:14px 28px; background:linear-gradient(135deg,#38bdf8,#818cf8);
             border:none; border-radius:12px; color:#fff; font-size:15px;
             cursor:pointer; margin-top:12px; width:100%; max-width:300px; }
  </style>
</head>
<body>
  <h1>🔧 Ripristino Agenda Polare</h1>
  <p>Tocca il pulsante per cancellare la cache corrotta e ricaricare l'app.</p>
  <div id="status">Pronto.</div>
  <button onclick="doFix()">Cancella cache e ripristina</button>

  <script>
  async function doFix() {
    const st = document.getElementById('status');
    st.textContent = '⏳ Cancellazione Service Worker...';
    try {
      // 1. Rimuove tutti i service worker
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) { await r.unregister(); }
        st.textContent = '✅ SW rimossi (' + regs.length + ')\n';
      }
      // 2. Cancella tutte le cache
      if ('caches' in window) {
        const keys = await caches.keys();
        for (const k of keys) { await caches.delete(k); }
        st.textContent += '✅ Cache cancellate (' + keys.length + ')\n';
      }
      st.textContent += '🔄 Ricarico tra 2 secondi...';
      setTimeout(() => window.location.reload(), 2000);
    } catch(e) {
      st.textContent = '❌ Errore: ' + e.message;
    }
  }
  </script>
</body>
</html>
