<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripristino Agenda Polare</title>
<style>
body{background:#040d1e;color:#e2e8f0;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
h1{color:#38bdf8;font-size:20px;margin-bottom:16px}
p{color:#94a3b8;font-size:14px;line-height:1.6;margin-bottom:8px}
#log{background:#0a1628;border:1px solid #1e3a5f;border-radius:10px;padding:14px;margin:16px 0;font-size:12px;font-family:monospace;text-align:left;width:100%;max-width:340px;min-height:130px;white-space:pre-wrap;color:#22d3ee}
button{padding:16px 28px;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;width:100%;max-width:340px}
.green{color:#34d399}
</style>
</head>
<body>
<h1>🔧 Ripristino Agenda Polare</h1>
<p>Cancella Service Worker e cache corrotti dal dispositivo.</p>
<div id="log">In attesa del tuo comando...</div>
<button onclick="fix()">RIPRISTINA ORA</button>
<script>
// IMPORTANTE: questa pagina NON registra alcun service worker
const log=document.getElementById('log');
function add(m,c){log.innerHTML+='\n'+(c?'<span class="'+c+'">'+m+'</span>':m);}
async function fix(){
  log.textContent='🔄 Avvio ripristino...';
  let sw=0,ca=0;
  if('serviceWorker' in navigator){
    try{
      const regs=await navigator.serviceWorker.getRegistrations();
      for(const r of regs){await r.unregister();sw++;}
      add('✅ Service Worker rimossi: '+sw,'green');
    }catch(e){add('⚠️ SW errore: '+e.message);}
  }
  if('caches' in window){
    try{
      const keys=await caches.keys();
      for(const k of keys){await caches.delete(k);ca++;}
      add('✅ Cache cancellate: '+ca,'green');
      if(keys.length)add('   '+keys.join('\n   '));
    }catch(e){add('⚠️ Cache errore: '+e.message);}
  }
  try{localStorage.clear();add('✅ localStorage svuotato','green');}catch(e){}
  add('');
  add('✅ RIPRISTINO COMPLETATO','green');
  add('');
  add('ADESSO:');
  add('1. Chiudi questa scheda');
  add('2. Carica i file v15.4 su GitHub');
  add('3. Riapri il link tra 2 minuti');
}
</script>
</body>
</html>
